name: botx
description: Advanced AI Assistant with RunAnywhere SDK - Fully Offline
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Routing
  go_router: ^14.0.0
  
  # RunAnywhere SDK for Local AI
  runanywhere_sdk:
    git:
      url: https://github.com/RunanywhereAI/runanywhere-sdks.git
      path: flutter
  
  # Voice
  speech_to_text: ^6.6.2
  flutter_tts: ^4.0.2
  flutter_sound: ^9.2.13
  
  # App Control
  android_intent_plus: ^4.0.3
  device_apps: ^2.2.0
  url_launcher: ^6.3.0
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  
  # UI
  glassmorphism: ^3.0.0
  flutter_svg: ^2.0.10
  
  # Theming
  flex_color_scheme: ^7.3.1
  
  # Utilities
  permission_handler: ^11.3.1
  flutter_secure_storage: ^9.0.0
  flutter_local_notifications: ^17.2.1
  vibration: ^2.0.0
  battery_plus: ^6.0.1
  intl: ^0.19.0
  path_provider: ^2.1.3
  contacts_service: ^0.6.3
  
  # Network (for model download only)
  dio: ^5.4.3
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/lottie/
    - assets/images/
    - assets/models/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
